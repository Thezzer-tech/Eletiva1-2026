<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width" initial-scale="1.0">
        <title>Exercicio 5</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        
        <style>
            .cordefundo{
                background-color: #f3f2f4;
            }
        </style>
    </head>
    <body>
        
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-body p-4 cordefundo">
                            <form class="row">
                                <h2>Billing address</h2>
                                
                                <div class="col-md-6 pt-3">
                                    <label class="form-label" for="fname">First name:</label>
                                    <input type="text" id="fname" class="form-control">
                                </div>
                                <div class="col-md-6 pt-3">
                                    <label for="lname" class="form-label fw-b">Last Name:</label>
                                    <input type="text" class="form-control" id="lname"> 
                                </div>
                                <div class="col-md-12 pt-3">
                                    <label for="user" class="form-label">Username:</label>
                                    <div class="input-group">
                                        <span class="input-group-text" id="addon-arroba">@</span>
                                        <input type="text" class="form-control" id="user" placeholder="Username" aria-label="Username" aria-describedy="addon-arroba">
                                    </div>
                                </div>
                                <div class="col-md-12 pt-3">
                                    <label for="e-mail"class="form-label">E-mail</label>
                                    <span class="text-muted fw-normal">(Optional)</span>
                                    <input type="email" class="form-control" placeholder="you@example.com" id="e-mail">
                                </div>
                                <div class="col-md-12 pt-3">
                                    <label for="address" class="form-label">Address</label>
                                    <input type="text" class="form-control" id="address" placeholder="1234 Main St">
                                </div>
                                <div class="col-md-12 pt-3">
                                    <label for="ad2" class="form-label">Adress 2</label>
                                    <span class="text-muted fw-normal">(Optional)</span>
                                    <input type="text" class="form-control" id="ad2" placeholder="Apartment or suite">
                                </div>
                                <div class="col-md-5 pt-3">
                                    <label for="co" class="form-label">Country</label>
                                    <select id="co" class="form-select">
                                        <option selected class="text-muted fw-normal">Choose...</option>
                                        <option value="1">Brazil</option>
                                        <option value="2">Switerzland</option>
                                        <option value="3">Germany</option>
                                    </select>
                                </div>
                                <div class="col-md-4 pt-3">
                                    <label for="state" class="form-label">State</label>
                                    <select id="state" class="form-select">
                                        <option selected class="text-muted fw-normal">Choose...</option>
                                        <option value="1">Active</option>
                                        <option value="2">Inative</option>
                                    </select>
                                </div>
                                <div class="col-md-3 pt-3">
                                    <label for="zIp" class="form-label">ZIP</label>
                                    <input type="text"id="zIp" class="form-control">
                                </div>
                                
                                <div class="mt-5">
                                    <div class="text-end">
                                        <button type="submit" class="btn btn-primary">Submit</button>
                                        <button type="reset" class="btn btn-light">Cancel</button>
                                    </div>
                                </div>
                                
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
