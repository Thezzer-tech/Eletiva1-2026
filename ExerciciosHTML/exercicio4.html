<!DOCTYPE html>
<html lang ="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" initial-scale=1.0>
        <title>Exercicio 4</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    </head>
    <body>
        
        <div class="container mt-4">
            <div class="row justify-content-center">
                
                <div class="col-md-8">
                    
                    <div class="card shadow-sm">
                        
                        <div class="car-body p-4">
                            
                            <form class="row">
                                
                                <div class="col-md-12">
                                    <label class="form-label fw-bold" for="name">Nome:</label>
                                    <input type="text" class="form-control" placeholder="Informe o nome" id="name">
                                </div>
                                
                                <div class="col-md-3 pt-2">
                                    <label for="cpf" class="form-label fw-bold">CPF:</label>
                                    <input type="text" id="cpf" class="form-control" placeholder="Informe o CPF">
                                </div>
                                <div class="col-md-6 pt-2">
                                    <label for="end" class="form-label fw-bold">Endereço:</label>
                                    <input type="text"class="form-control" id="end" placeholder="Informe o endereço">
                                </div>
                                <div class="col-md-3 pt-2">
                                    <label for="nivel" class="form-label fw-bold">Nível:</label>
                                    <select class="form-select fw-bold" id="nivel">
                                        <option selected>---</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                    </select>
                                    
                                </div>
                                <div class="col-md-6 pt-2">
                                    <label for="eMail" class="form-label fw-bold">E-Mail:</label>
                                    <input type="email" id="eMail" class="form-control" placeholder="Informe o E-mail">
                                </div>
                                <div class="col-md-3 pt-2">
                                    <label for="senha" class="form-label fw-bold">Senha:</label>
                                    <input type="password" class="form-control" placeholder="Informe senha" id="senha">
                                </div>
                                <div class="col-md-3 pt-2">
                                    <label for="status" class="form-label fw-bold">Status:</label>
                                    <select class="form-select fw-bold" id="status">
                                        <option selected>---</option>
                                        <option value="1">Ativo</option>
                                        <option value="2">Inativo</option>
                                    </select> 
                                </div>
                                
                                <div class="mt-5">
                                    <div class="text-end">
                                        <button class="btn btn-success" type="submit">Enviar</button>
                                        <button class="btn btn-light" type="reset">Cancelar</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
